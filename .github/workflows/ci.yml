name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Engine unit tests
        run: npm test

      - name: Typecheck API
        run: npm run typecheck

      - name: Build web (typecheck + bundle)
        run: npm run build
